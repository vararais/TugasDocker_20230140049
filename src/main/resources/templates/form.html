<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Input</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;}
        .btn-submit { background-color: #0d6efd; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<h3>Form Input Mahasiswa</h3>

<form action="/submit" method="post" style="max-width: 600px;">
    <div class="form-group">
        <label>Nama:</label>
        <input type="text" name="nama" required>
    </div>

    <div class="form-group">
        <label>NIM:</label>
        <input type="text" name="nim" required>
    </div>

    <div class="form-group">
        <label>Jenis Kelamin:</label><br><br>
        <input type="radio" id="laki" name="jenisKelamin" value="Laki-laki" required>
        <label for="laki">Laki-laki</label><br><br>
        <input type="radio" id="perempuan" name="jenisKelamin" value="Perempuan" required>
        <label for="perempuan">Perempuan</label>
    </div>

    <button type="submit" class="btn-submit">Submit</button>
</form>

<br>
<a href="/home" style="text-decoration: none; color: #0d6efd;">Kembali ke Home</a>

</body>
</html>
